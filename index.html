<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BENITEZ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

/* LOGIN */

#login{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.login-box{
background:#111;
padding:40px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.3);
}

.login-box h2{
color:#ff0000;
margin-bottom:20px;
letter-spacing:3px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
background:#1c1c1c;
color:white;
border-radius:6px;
}

button{
width:100%;
padding:12px;
border:none;
background:#ff0000;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#cc0000;
}

/* APP */

#app{
display:none;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:#000;
padding:18px;
text-align:center;
font-size:28px;
font-weight:700;
letter-spacing:5px;
cursor:pointer;
border-bottom:1px solid #1a1a1a;
z-index:1000;
}

header:hover{
color:#ff0000;
}

/* CONTENT */

.container{
padding-top:100px;
width:90%;
max-width:900px;
margin:auto;
}

/* CARDS */

.section{
background:#111;
margin:40px 0;
padding:50px 30px;
border-radius:14px;
text-align:center;
transition:.3s;
box-shadow:0 0 20px rgba(255,0,0,0.15);
}

.section:hover{
transform:translateY(-5px);
box-shadow:0 0 35px rgba(255,0,0,0.35);
}

.section h2{
color:#ff0000;
margin-bottom:30px;
font-size:28px;
letter-spacing:2px;
}

/* TEAM */

.member{
margin:14px 0;
font-size:18px;
opacity:.9;
}

/* BUTTON LINK */

.link-btn{
display:inline-block;
margin-top:20px;
padding:16px 28px;
background:#ff0000;
border-radius:8px;
text-decoration:none;
color:white;
font-weight:600;
font-size:18px;
transition:.3s;
}

.link-btn:hover{
background:#cc0000;
transform:scale(1.05);
}

/* MOBILE PRO */

@media(max-width:768px){

.section{
padding:60px 20px;
}

.section h2{
font-size:32px;
}

.member{
font-size:20px;
}

.link-btn{
width:100%;
font-size:20px;
padding:18px;
}

}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>BENITEZ</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>

</div>
</div>


<!-- APP -->
<div id="app">

<header onclick="scrollTopPage()">BENITEZ</header>

<div class="container">

<!-- EQUIPO -->
<div class="section" id="equipo">
<h2>EQUIPO</h2>

<div class="member">Pablo Mazo — Manager</div>
<div class="member">Tomas Gallego — Marketing</div>
<div class="member">Sebastian Muñoz — Camarógrafo</div>
<div class="member">Yerson — Director Logístico</div>
<div class="member">Angelo Tamayo — Asistente Personal</div>

</div>

<!-- CANCIONES -->
<div class="section" id="canciones">
<h2>CANCIONES</h2>

<p>Acceso privado al catálogo musical del artista.</p>

<a class="link-btn"
href="https://drive.google.com/drive/folders/1vCpXlgufFSmUJyJj7qVpS10hlOPE5GhJ?usp=drive_link"
target="_blank">

ENTRAR AL DRIVE

</a>

</div>

</div>
</div>


<script>

/* LOGIN SIMPLE */

function login(){

const usuario="benitez";
const contraseña="1234";

const u=document.getElementById("user").value;
const p=document.getElementById("pass").value;

if(u===usuario && p===contraseña){

document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";

}else{
alert("Datos incorrectos");
}
}

/* VOLVER ARRIBA */

function scrollTopPage(){
window.scrollTo({
top:0,
behavior:"smooth"
});
}

</script>

</body>
</html>
