<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENÍTEZ | Staff</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Creepster&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

/* ================= BASE ================= */

:root{
--red:#ff0000;
--black:#000;
--card:#0d0d0d;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:
radial-gradient(circle at top,#140000,#000 60%);
color:white;
min-height:100vh;
overflow-x:hidden;
}

/* ================= LOGIN ================= */

#login-screen{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:45px;
border-radius:18px;
width:90%;
max-width:340px;
text-align:center;
border:1px solid #222;
box-shadow:0 0 40px rgba(255,0,0,.15);
animation:fadeIn .8s ease;
}

.login-box h1{
font-family:'Creepster';
color:var(--red);
font-size:42px;
margin-bottom:20px;
text-shadow:0 0 20px red;
}

input{
width:100%;
padding:14px;
margin:10px 0;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:var(--red);
border:none;
color:white;
font-weight:600;
border-radius:8px;
cursor:pointer;
transition:.3s;
}

button:hover{background:#cc0000}

/* ================= DASHBOARD ================= */

#dashboard{display:none;}

.sidebar{
width:260px;
height:100vh;
background:#000;
border-right:1px solid #1a1a1a;
position:fixed;
padding:30px 20px;
}

.logo-side{
font-family:'Creepster';
font-size:32px;
color:var(--red);
text-align:center;
margin-bottom:50px;
text-shadow:0 0 15px red;
cursor:pointer;
}

.menu-btn{
font-family:'Bebas Neue';
font-size:26px;
padding:14px;
margin-bottom:12px;
text-align:center;
color:#777;
cursor:pointer;
border-radius:8px;
transition:.3s;
}

.menu-btn:hover{
background:#111;
color:white;
}

.menu-btn.active{
background:rgba(255,0,0,.15);
border-left:4px solid var(--red);
color:white;
}

.main-content{
margin-left:260px;
padding:50px;
animation:fadeIn .7s ease;
}

/* ================= SECTIONS ================= */

.section{
display:none;
opacity:0;
transform:translateY(20px);
transition:.4s;
}

.section.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* ================= CARDS ================= */

.card{
background:var(--card);
padding:28px;
border-radius:14px;
border:1px solid #222;
margin-bottom:25px;
transition:.3s;
box-shadow:0 0 20px rgba(255,0,0,.05);
}

.card:hover{
transform:translateY(-5px);
border:1px solid var(--red);
}

h2{
font-family:'Bebas Neue';
font-size:3rem;
color:var(--red);
margin-bottom:20px;
}

h3{
font-family:'Bebas Neue';
margin-bottom:10px;
}

.role-tag{
color:var(--red);
font-size:12px;
letter-spacing:2px;
margin-bottom:5px;
display:block;
}

ul{list-style:none;margin-top:10px}
li{margin-bottom:8px;color:#bbb}

/* ================= MOBILE ================= */

@media(max-width:768px){

.sidebar{
position:relative;
width:100%;
height:auto;
display:flex;
justify-content:space-around;
padding:15px;
border-bottom:1px solid #222;
}

.logo-side{display:none;}

.menu-btn{
font-size:24px;
padding:12px 10px;
flex:1;
}

.main-content{
margin-left:0;
padding:25px 18px;
}

}

/* ================= ANIM ================= */

@keyframes fadeIn{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

.logout{
position:fixed;
top:15px;
right:15px;
color:var(--red);
cursor:pointer;
font-size:12px;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
<div class="login-box">
<h1>BENÍTEZ</h1>
<input id="uIn" placeholder="Usuario">
<input id="pIn" type="password" placeholder="Contraseña">
<button onclick="accessNow()">ENTRAR</button>
<p id="err" style="color:red;font-size:12px"></p>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<div class="logout" onclick="exitNow()">Cerrar sesión</div>

<div class="sidebar">
<div class="logo-side" onclick="tab('identidad')">BENÍTEZ</div>
<div class="menu-btn active" id="m-id" onclick="tab('identidad')">Identidad</div>
<div class="menu-btn" id="m-eq" onclick="tab('equipo')">Equipo</div>
<div class="menu-btn" id="m-ca" onclick="tab('canciones')">Canciones</div>
</div>

<div class="main-content">

<div id="identidad" class="section active">
<h2>Identidad</h2>
<div class="card">
“El man que les gusta a las mujeres, pero con calle real”
</div>
</div>

<div id="equipo" class="section">
<h2>Equipo</h2>
<div class="card"><span class="role-tag">MANAGER</span>Mazo</div>
<div class="card"><span class="role-tag">MARKETING</span>Tomás</div>
<div class="card"><span class="role-tag">CÁMARA</span>Sebastián</div>
</div>

<div id="canciones" class="section">
<h2>Canciones</h2>
<div class="card" style="text-align:center">
<a href="https://drive.google.com/drive/folders/1vCpXlgufFSmUJyJj7qVpS10hlOPE5GhJ?usp=drive_link"
target="_blank"
style="background:red;padding:15px 30px;border-radius:8px;color:white;text-decoration:none;font-weight:600;">
ABRIR DRIVE
</a>
</div>
</div>

</div>
</div>

<script>

function accessNow(){
if(
document.getElementById("uIn").value==="equipo" &&
document.getElementById("pIn").value==="benitez2026"
){
localStorage.setItem("bnz","ok");
load();
}else{
document.getElementById("err").innerText="Acceso denegado";
}
}

function exitNow(){
localStorage.removeItem("bnz");
location.reload();
}

function load(){
if(localStorage.getItem("bnz")==="ok"){
document.getElementById("login-screen").style.display="none";
document.getElementById("dashboard").style.display="block";
}
}

function tab(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.querySelectorAll(".menu-btn").forEach(b=>b.classList.remove("active"));
document.getElementById(id).classList.add("active");
document.getElementById("m-"+id.substring(0,2)).classList.add("active");
}

window.onload=load;

</script>

</body>
</html>
