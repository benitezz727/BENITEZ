
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENÍTEZ | Staff Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Creepster&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
    :root { --red: #ff0000; --dark: #0a0a0a; --gray: #111; }
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
    
    body{background:#000; color:white; min-height:100vh; overflow-x:hidden;}

    /* LOGIN */
    .login-container{height:100vh; display:flex; justify-content:center; align-items:center; background:radial-gradient(circle at top,#1a0000,#000 70%);}
    .login-box{background:rgba(10,10,10,0.9); padding:40px; border-radius:20px; width:320px; text-align:center; border:1px solid #222;}
    .login-box h1{font-family:'Creepster'; color:var(--red); font-size:40px; margin-bottom:20px;}
    input, button{width:100%; padding:12px; margin:10px 0; border-radius:8px; border:none; outline:none;}
    input{background:#000; border:1px solid #333; color:white;}
    button{background:var(--red); color:white; font-weight:600; cursor:pointer; text-transform:uppercase;}

    /* DASHBOARD LAYOUT */
    #dashboard{display:none;}
    .wrapper{display:flex; min-height:100vh;}

    /* SIDEBAR */
    .sidebar{width:260px; background:#000; border-right:1px solid var(--gray); position:fixed; height:100vh; padding:30px 20px; z-index:100;}
    .logo-side{font-family:'Creepster'; color:var(--red); font-size:30px; text-align:center; margin-bottom:40px;}
    .menu a{display:block; font-family:'Bebas Neue'; font-size:22px; padding:12px; color:#666; cursor:pointer; text-decoration:none; text-align:center; margin-bottom:10px; transition:0.3s; border-radius:8px;}
    .menu a:hover, .menu a.active{color:white; background:rgba(255,0,0,0.1); border-left:4px solid var(--red);}

    /* MAIN CONTENT */
    .main-content{margin-left:260px; padding:40px; width:100%; background:radial-gradient(circle at top right, #0d0000, #000);}
    .section{display:none; animation: fadeIn 0.4s ease-in-out;}
    .section.active{display:block;}
    @keyframes fadeIn {from{opacity:0;} to{opacity:1;}}

    /* ESTILOS DE CONTENIDO */
    h2{font-family:'Bebas Neue'; font-size:3rem; margin-bottom:20px; border-bottom:2px solid var(--red); display:inline-block;}
    h3{font-family:'Bebas Neue'; color:var(--red); font-size:1.8rem; margin:20px 0 10px 0;}
    .card{background:var(--dark); padding:25px; border-radius:15px; border:1px solid #222; margin-bottom:20px; line-height:1.6;}
