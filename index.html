<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BENÍTEZ | Staff Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Creepster&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

:root{
--red:#ff0000;
--dark:#0a0a0a;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

body{
background:#000;
color:white;
}

/* LOGIN */

#login-screen{
position:fixed;
width:100%;
height:100%;
background:#000;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.login-box{
background:#111;
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
border:1px solid #333;
}

.login-box h1{
font-family:Creepster;
color:var(--red);
font-size:42px;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin:10px 0;
background:#000;
border:1px solid #444;
color:white;
}

button{
width:100%;
padding:14px;
background:var(--red);
border:none;
color:white;
font-weight:600;
cursor:pointer;
}

/* DASHBOARD */

#dashboard{display:none;}

.sidebar{
width:260px;
height:100vh;
background:#000;
border-right:1px solid #222;
position:fixed;
padding:30px 20px;
}

.logo-side{
font-family:Creepster;
color:var(--red);
font-size:32px;
text-align:center;
margin-bottom:40px;
}

.menu-btn{
font-family:'Bebas Neue';
font-size:26px;
padding:15px;
text-align:center;
color:#777;
cursor:pointer;
margin-bottom:12px;
border-radius:6px;
}

.menu-btn.active{
color:white;
background:rgba(255,0,0,.15);
border-left:4px solid var(--red);
}

.main{
margin-left:260px;
padding:40px;
}

.section{display:none;}
.section.active{display:block;}

.card{
background:#0d0d0d;
padding:25px;
border-radius:12px;
border:1px solid #222;
margin-bottom:20px;
}

h2{
font-family:'Bebas Neue';
font-size:3rem;
color:var(--red);
margin-bottom:20px;
}

.logout{
position:fixed;
top:15px;
right:15px;
color:red;
cursor:pointer;
font-size:12px;
}

@media(max-width:768px){
.sidebar{
width:100%;
height:auto;
position:relative;
}
.main{
margin-left:0;
padding:20px;
}
.menu-btn{
font-size:32px;
padding:20px;
}
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
<div class="login-box">
<h1>BENÍTEZ</h1>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">ENTRAR</button>
<p id="error" style="color:red;font-size:12px"></p>

</div>
</div>

<!-- PANEL -->
<div id="dashboard">

<div class="logout" onclick="logout()">CERRAR SESIÓN</div>

<div class="sidebar">
<div class="logo-side">BENÍTEZ</div>

<div id="menu"></div>

</div>

<div class="main">

<!-- IDENTIDAD -->
<div id="identidad" class="section">
<h2>Identidad</h2>
<div class="card">
“El man que les gusta a las mujeres, pero con calle real”
</div>
</div>

<!-- EQUIPO -->
<div id="equipo" class="section">
<h2>Equipo</h2>
<div class="card">Panel interno del staff.</div>
</div>

<!-- CANCIONES -->
<div id="canciones" class="section">
<h2>Canciones</h2>
<div class="card" style="text-align:center">
<a href="https://drive.google.com/drive/folders/1vCpXlgufFSmUJyJj7qVpS10hlOPE5GhJ?usp=drive_link"
target="_blank"
style="background:red;padding:15px 30px;color:white;text-decoration:none;font-weight:bold;border-radius:6px;">
ABRIR DRIVE
</a>
</div>
</div>

</div>
</div>

<script>

/* ===== USUARIOS PRO ===== */

const USERS={
equipo:{pass:"benitez2026",role:"admin"},
mazo:{pass:"manager",role:"manager"},
tomas:{pass:"marketing",role:"marketing"},
sebastian:{pass:"camara",role:"camara"}
};

/* ===== PERMISOS ===== */

const PERMISSIONS={
admin:["identidad","equipo","canciones"],
manager:["identidad","equipo","canciones"],
marketing:["identidad","canciones"],
camara:["canciones"]
};

/* LOGIN */

function login(){

const u=document.getElementById("user").value.toLowerCase();
const p=document.getElementById("pass").value;

if(USERS[u] && USERS[u].pass===p){

localStorage.setItem("bnzUser",u);
loadDashboard();

}else{
document.getElementById("error").innerText="Acceso incorrecto";
}
}

/* LOAD */

function loadDashboard(){

const user=localStorage.getItem("bnzUser");
if(!user)return;

document.getElementById("login-screen").style.display="none";
document.getElementById("dashboard").style.display="block";

buildMenu(USERS[user].role);
}

/* MENU DINÁMICO */

function buildMenu(role){

const menu=document.getElementById("menu");
menu.innerHTML="";

PERMISSIONS[role].forEach(sec=>{

const btn=document.createElement("div");
btn.className="menu-btn";
btn.innerText=sec.toUpperCase();

btn.onclick=()=>openTab(sec);

menu.appendChild(btn);

});

openTab(PERMISSIONS[role][0]);
}

function openTab(id){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("active"));

document.getElementById(id).classList.add("active");

document.querySelectorAll(".menu-btn")
.forEach(b=>b.classList.remove("active"));

event.target.classList.add("active");
}

function logout(){
localStorage.removeItem("bnzUser");
location.reload();
}

window.onload=loadDashboard;

</script>

</body>
</html>
