<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BENITEZ</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b0b0f;
color:white;
overflow-x:hidden;
}

/* ===== HEADER ===== */
header{
position:fixed;
top:0;
width:100%;
padding:20px;
text-align:center;
font-size:22px;
letter-spacing:4px;
font-weight:700;
background:rgba(10,10,15,0.6);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.06);
cursor:pointer;
z-index:1000;
}

/* ===== CONTAINER ===== */
.container{
max-width:900px;
margin:auto;
padding:110px 20px 40px;
}

/* ===== MENU ===== */
.menu{
display:flex;
flex-direction:column;
gap:28px;
}

/* ===== CARDS ===== */
.card{
background:linear-gradient(145deg,#111118,#181822);
border-radius:22px;
padding:55px 30px;
text-align:center;
cursor:pointer;
transition:0.35s;
border:1px solid rgba(255,255,255,0.05);
}

.card:hover{
transform:translateY(-6px);
background:linear-gradient(145deg,#151520,#20202b);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.icon{
font-size:72px;
margin-bottom:18px;
}

.title{
font-size:30px;
font-weight:600;
}

/* ===== SECTIONS ===== */
.section{
display:none;
animation:fade 0.4s ease;
}

.section.active{
display:block;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== TEAM ===== */
.member{
background:#14141c;
padding:20px;
border-radius:14px;
margin-bottom:14px;
border:1px solid rgba(255,255,255,0.05);
font-size:18px;
transition:0.25s;
}

.member:hover{
background:#1b1b25;
}

/* ===== BUTTON ===== */
.back{
margin-top:25px;
width:100%;
padding:14px;
background:white;
color:black;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.back:hover{
opacity:0.85;
}

/* ===== LINK CARD ===== */
.link-card{
text-decoration:none;
color:white;
display:block;
}

/* ===== MOBILE ===== */
@media(max-width:600px){

.icon{
font-size:90px;
}

.title{
font-size:34px;
}

.card{
padding:65px 25px;
}

.member{
font-size:20px;
}

}

</style>
</head>

<body>

<header onclick="goHome()">BENITEZ</header>

<div class="container">

<!-- ===== HOME ===== -->
<div id="home" class="menu">

<div class="card" onclick="openSection('equipo')">
<div class="icon">👥</div>
<div class="title">Equipo</div>
</div>

<div class="card" onclick="openSection('canciones')">
<div class="icon">🎵</div>
<div class="title">Canciones</div>
</div>

</div>

<!-- ===== EQUIPO ===== -->
<div id="equipo" class="section">

<h2 style="margin-bottom:20px;">Equipo</h2>

<div class="member">Andrés Parra — Management</div>
<div class="member">Yerson — Producción</div>
<div class="member">Angelo — Visual & Media</div>

<button class="back" onclick="goHome()">Volver</button>

</div>

<!-- ===== CANCIONES ===== -->
<div id="canciones" class="section">

<h2 style="margin-bottom:20px;">Canciones</h2>

<a class="link-card"
href="https://drive.google.com/drive/folders/1vCpXlgufFSmUJyJj7qVpS10hlOPE5GhJ?usp=drive_link"
target="_blank">

<div class="card">
<div class="icon">🎧</div>
<div class="title">Abrir Drive</div>
</div>

</a>

<button class="back" onclick="goHome()">Volver</button>

</div>

</div>

<script>

function openSection(id){

document.getElementById("home").style.display="none";

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active");
});

document.getElementById(id).classList.add("active");
window.scrollTo(0,0);
}

function goHome(){

document.getElementById("home").style.display="flex";

document.querySelectorAll(".section").forEach(sec=>{
sec.classList.remove("active");
});

window.scrollTo(0,0);
}

</script>

</body>
</html>
